<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>My test page</title>

    <link rel="stylesheet" href="style.css">
    <script src="form.js" defer></script>
</head>
<body>

<form method="post">
    <h1>Meow Form</h1>
    <p>
        Required fields are followed by
        <strong><span aria-label="required">*</span></strong>.
    </p>
    <section>
        <h2>Meow information</h2>
        <p>
            <label for="name">
                <span>Name: </span>
                <strong><span aria-label="required">*</span></strong>
            </label>
            <input type="text" id="name" name="name" required />
        </p>
        <p>
            <label for="breed">
                <span>Breed:</span>
                <strong><span aria-label="required">*</span></strong>
            </label>
            <select id="breed" name="breed" required>
                <option value="">--Please choose an option--</option>
                <option value="Bengal">Bengal</option>
                <option value="Birman">Birman</option>
                <option value="British shorthair ">British shorthair</option>
            </select>
        </p>
        <fieldset>
            <legend>Gender:</legend>
            <div>
                <input type="radio" id="boy" name="gender" value="boy">
                <label for="boy">Boy</label>
            </div>
            <div>
                <input type="radio" id="girl" name="gender" value="girl">
                <label for="girl">Girl</label>
            </div>
            <div>
                <input type="radio" id="gender_unknown" name="gender" value="unknown" checked>
                <label for="gender_unknown">Unknown</label>
            </div>
        </fieldset>
        <p>
            <label for="color">
                <span>Color:</span>
            </label>
            <input type="color" id="color" name="color"/>
        </p>
        <p>
            <label for="age">
                <span>Age:</span>
                <strong><span aria-label="required">*</span></strong>
            </label>
            <input type="number" id="age" name="meow_name" min="1" max="20" required>
        </p>
        <p>
            <label for="birthday">
                <span>Birthday:</span>
            </label>
            <input type="date" id="birthday" name="birthday"/>
        </p>
        <p>
            <label for="appetite">
                <span>Appetite:</span>
            </label>
            <input type="range" id="appetite" name="meow_appetite" min="0" max="100" step="1" value="20">
            <output class="appetite-output" for="price"></output>
        </p>
        <fieldset>
            <legend>Favourite food:</legend>
            <div>
                <input type="checkbox" id="meat" name="food" value="meat" checked/>
                <label for="meat">Meat</label>
            </div>
            <div>
                <input type="checkbox" id="fish" name="food" value="fish"/>
                <label for="fish">Fish</label>
            </div>
            <div>
                <input type="checkbox" id="other_food" name="food" value="other"/>
                <label for="other_food">Other</label>
            </div>
        </fieldset>
        <p>
            <label for="note">Note:</label>
            <textarea id="note" name="note" cols="30" rows="8"></textarea>
        </p>
    </section>
    <section>
        <h2>Owner information</h2>
        <p>
            <label for="phone_number">
                <span>Card number:</span>
                <strong><span aria-label="required">*</span></strong>
            </label>
            <input type="tel" id="phone_number" name="owner_phone_number" required/>
        </p>
        <p>
            <label for="email">
                <span>Email: </span>
                <strong><span aria-label="required">*</span></strong>
            </label>
            <input type="email" id="email" name="owner_email" required />
        </p>
    </section>
    <section>
        <p><button type="submit">Submit</button></p>
    </section>
</form>


</body>
</html>
